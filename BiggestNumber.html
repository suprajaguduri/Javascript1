<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiggestNumber</title>
</head>
<body>
    <script>
        var arr=[15,12,27,7,30];
        var big=arr[0];
        for(let i=0;i<arr.length;i++){
            if(arr[i]>big){
                big=arr[i];
            }
        }
        document.write("Biggest Number:", big);
    </script>
</body>
</html>
